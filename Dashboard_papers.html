    <style>
        /* Capa de texto de PDF.js: texto invisible superpuesto al canvas para poder seleccionar */
        .textLayer { position: absolute; inset: 0; overflow: hidden; line-height: 1; text-align: initial; }
        .textLayer span, .textLayer br { color: transparent; position: absolute; white-space: pre; cursor: text; transform-origin: 0% 0%; }
        .textLayer ::selection { background: rgba(59, 130, 246, 0.35); }
        .pdf-page { position: relative; margin: 12px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.25); background: white; }
        .hl-overlay { position: absolute; background: rgba(255, 213, 79, 0.42); pointer-events: auto; cursor: pointer; border-radius: 1px; }
        .hl-overlay:hover { background: rgba(255, 82, 82, 0.35); }
        #readerSplitter { transition: background 0.15s; touch-action: none; }
    </style>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; transition: background-color 0.3s, color 0.3s; }
        .chip { transition: all 0.2s; }
        .chip.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>

    <script>
        // ============================================================
        // CONFIGURACIÓN (editar aquí)
        // ============================================================
        // Unpaywall exige un email real e identificable en cada llamada.
        // Sustituir por uno propio o de servicio antes de usar en producción.
        const UNPAYWALL_EMAIL = "ivancarrion@gmail.com";
        // Clave API de NCBI (opcional). Sin clave: ~3 req/s. Con clave: ~10 req/s.
        // Obtener en https://www.ncbi.nlm.nih.gov/account/settings/  Dejar "" si no se usa.
        const NCBI_API_KEY = "";
        // Año de referencia de los Factores de Impacto mostrados en las insignias.
        const IF_YEAR = "2024";
        // Tamaño de lote para efetch (evita URLs excesivamente largas y respeta límites de NCBI).
        const EFETCH_BATCH_SIZE = 50;
        // ------------------------------------------------------------
        // DROPBOX (biblioteca accesible desde cualquier dispositivo, incluido iPad)
        //
        // REGISTRO DE LA APP (solo una vez, 2 minutos, gratis):
        //  1. Ir a https://www.dropbox.com/developers/apps → "Create app"
        //  2. Elegir: "Scoped access" → "App folder" (la app solo verá su propia carpeta,
        //     que Dropbox crea automáticamente en Aplicaciones/<nombre-app>)
        //  3. Nombre: "PaperLibrary" (o el que quieras; debe ser único en Dropbox)
        //  4. En la pestaña "Permissions": marcar "files.content.write" y "files.content.read"
        //     y pulsar Submit.
        //  5. En la pestaña "Settings" → "OAuth 2" → "Redirect URIs": añadir la URL exacta
        //     donde alojarás este HTML, ej. https://TUUSUARIO.github.io/paperlib/Dashboard_papers.html
        //     (OAuth no funciona con archivos locales file:// — hace falta GitHub Pages o similar)
        //  6. Copiar el "App key" de Settings y pegarlo abajo:
        const DROPBOX_APP_KEY = "668athd8lz2pdy2";
        // ------------------------------------------------------------
        // ============================================================

        // Etiquetas para resaltado visual y filtrado local
        const tags = ["LI-RADS", "Hepatobiliary", "Pancreas", "Rectal", "Crohn", "Prostate", "HCC", "Cholangiocarcinoma", "O-RADS"];
        const highlightKeywords = ["LI-RADS", "HCC", "O-RADS", "tumor", "fistula", "MRI", "cirrhosis", "hepatocellular", "carcinoma", "malignancy", "lesion", "metastasis", "crohn", "colitis"];
        const highImpactRegex = /guideline|consensus|meta-analysis|systematic review|multicenter|randomized/i;
        
        // Diccionarios de Subespecialidades (Mega-Queries para PubMed)
        const subspecQueries = {
            "HPB": `AND (hepatobiliary[tiab] OR liver[tiab] OR hepatic[tiab] OR biliary[tiab] OR pancreas[tiab] OR pancreatic[tiab] OR gallbladder[tiab] OR cholangio*[tiab] OR HCC[tiab] OR cirrhosis[tiab])`,
            "GI": `AND (gastrointestinal[tiab] OR bowel[tiab] OR colon*[tiab] OR rectum[tiab] OR rectal[tiab] OR gastric[tiab] OR stomach[tiab] OR esophagus[tiab] OR esophageal[tiab] OR intestin*[tiab] OR crohn*[tiab] OR colitis[tiab] OR appendi*[tiab] OR peritoneum[tiab] OR mesenteric[tiab] OR fistula[tiab])`,
            "GU": `AND (genitourinary[tiab] OR urologic[tiab] OR renal[tiab] OR kidney[tiab] OR prostate[tiab] OR prostatic[tiab] OR bladder[tiab] OR pelvic[tiab] OR pelvis[tiab] OR ovar*[tiab] OR uter*[tiab] OR adnexal[tiab] OR testic*[tiab] OR gynecolog*[tiab])`,
            "ONCO": `AND (oncology[tiab] OR cancer[tiab] OR tumor[tiab] OR tumour[tiab] OR neoplasm*[tiab] OR metastasis[tiab] OR metastases[tiab] OR malignant[tiab])`
        };

        const journalData = {
            "Radiology": { if: "19.7", q: "Q1", style: "bg-amber-100 text-amber-800 border-amber-200 dark:bg-amber-900/30 dark:text-amber-300 dark:border-amber-800" },
            "RadioGraphics": { if: "5.5", q: "Q1", style: "bg-amber-100 text-amber-800 border-amber-200 dark:bg-amber-900/30 dark:text-amber-300 dark:border-amber-800" },
            "Eur Radiol": { if: "5.9", q: "Q1", style: "bg-amber-100 text-amber-800 border-amber-200 dark:bg-amber-900/30 dark:text-amber-300 dark:border-amber-800" },
            "AJR": { if: "4.7", q: "Q1", style: "bg-amber-100 text-amber-800 border-amber-200 dark:bg-amber-900/30 dark:text-amber-300 dark:border-amber-800" },
            "Abdom Radiol": { if: "2.3", q: "Q2", style: "bg-emerald-100 text-emerald-800 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-300 dark:border-emerald-800" },
            "Can Assoc Radiol": { if: "2.7", q: "Q2", style: "bg-emerald-100 text-emerald-800 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-300 dark:border-emerald-800" },
            "Br J Radiol": { if: "2.6", q: "Q2", style: "bg-emerald-100 text-emerald-800 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-300 dark:border-emerald-800" },
            "Radiol Clin North Am": { if: "2.1", q: "Q2", style: "bg-emerald-100 text-emerald-800 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-300 dark:border-emerald-800" },
            "Radiologia": { if: "1.0", q: "Q4", style: "bg-slate-100 text-slate-800 border-slate-200 dark:bg-slate-700 dark:text-slate-300 dark:border-slate-600" }
        };

        let activeTags = new Set();
        let currentArticles = [];
        let currentlyDisplayedFiltered = [];
        let showingFavorites = false;

        // --- Biblioteca en Dropbox ---
        let dbxAccessToken = null;      // Access token vigente (efímero, ~4h)
        let libraryIndex = [];          // Índice ligero cargado desde index.json
        let showingLibrary = false;
        let libraryStatusFilter = 'all'; // all | to-read | reading | read
        let activeLibTags = new Set();   // Tags activos en el filtro de biblioteca
        let libSearchQuery = '';         // Texto de búsqueda dentro de la biblioteca

        function toggleLibTag(tag) {
            if (activeLibTags.has(tag)) activeLibTags.delete(tag); else activeLibTags.add(tag);
            renderLibrary();
        }
        function clearLibTags() { activeLibTags.clear(); renderLibrary(); }
        let libSearchDebounce = null;
        function setLibrarySearch(v) {
            libSearchQuery = v;
            clearTimeout(libSearchDebounce);
            // Debounce para no re-renderizar (y perder el foco) en cada tecla
            libSearchDebounce = setTimeout(() => {
                const el = document.activeElement;
                const pos = el && el.selectionStart;
                renderLibrary();
                // Restaurar foco en el buscador tras re-render
                const input = document.querySelector('#libraryContainer input[type="text"]');
                if (input) { input.focus(); if (pos != null) input.setSelectionRange(pos, pos); }
            }, 300);
        }

        function libraryConnected() { return !!dbxAccessToken; }

        // --- OAuth 2 PKCE (flujo de redirección: funciona en Safari/iPad sin popups) ---
        function b64url(bytes) {
            return btoa(String.fromCharCode(...new Uint8Array(bytes))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }
        function randomVerifier() {
            const arr = new Uint8Array(48);
            crypto.getRandomValues(arr);
            return b64url(arr);
        }
        async function sha256(str) {
            return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
        }

        async function startDropboxLogin() {
            const verifier = randomVerifier();
            sessionStorage.setItem('dbx_pkce_verifier', verifier);
            const challenge = b64url(await sha256(verifier));
            const redirect = window.location.origin + window.location.pathname;
            const url = `https://www.dropbox.com/oauth2/authorize?client_id=${encodeURIComponent(DROPBOX_APP_KEY)}` +
                `&response_type=code&code_challenge=${challenge}&code_challenge_method=S256` +
                `&redirect_uri=${encodeURIComponent(redirect)}&token_access_type=offline`;
            window.location.href = url;
        }

        async function exchangeCodeForTokens(code) {
            const verifier = sessionStorage.getItem('dbx_pkce_verifier');
            if (!verifier) throw new Error('Falta el verificador PKCE (¿sesión de navegador nueva a mitad de login?)');
            const redirect = window.location.origin + window.location.pathname;
            const body = new URLSearchParams({
                code, grant_type: 'authorization_code', client_id: DROPBOX_APP_KEY,
                code_verifier: verifier, redirect_uri: redirect
            });
            const res = await fetch('https://api.dropboxapi.com/oauth2/token', { method: 'POST', body });
            if (!res.ok) throw new Error('Intercambio de token falló: ' + res.status);
            const data = await res.json();
            dbxAccessToken = data.access_token;
            if (data.refresh_token) localStorage.setItem('dbx_refresh_token', data.refresh_token);
            sessionStorage.removeItem('dbx_pkce_verifier');
        }

        async function refreshDropboxToken() {
            const refreshToken = localStorage.getItem('dbx_refresh_token');
            if (!refreshToken) return false;
            const body = new URLSearchParams({
                grant_type: 'refresh_token', refresh_token: refreshToken, client_id: DROPBOX_APP_KEY
            });
            const res = await fetch('https://api.dropboxapi.com/oauth2/token', { method: 'POST', body });
            if (!res.ok) {
                localStorage.removeItem('dbx_refresh_token'); // refresh token revocado o inválido
                return false;
            }
            const data = await res.json();
            dbxAccessToken = data.access_token;
            return true;
        }

        // fetch autenticado contra Dropbox con renovación automática si el token expira
        async function dbxFetch(url, options = {}) {
            const doFetch = () => fetch(url, {
                ...options,
                headers: { 'Authorization': `Bearer ${dbxAccessToken}`, ...(options.headers || {}) }
            });
            let res = await doFetch();
            if (res.status === 401) {
                const ok = await refreshDropboxToken();
                if (ok) res = await doFetch();
            }
            return res;
        }

        // Rutas relativas a la carpeta de la app (Dropbox/Aplicaciones/<nombre-app>/)
        function libPath(rel) { return '/' + rel; }

        async function dbxWriteFile(rel, blobOrString) {
            const res = await dbxFetch('https://content.dropboxapi.com/2/files/upload', {
                method: 'POST',
                headers: {
                    'Dropbox-API-Arg': JSON.stringify({ path: libPath(rel), mode: 'overwrite', mute: true }),
                    'Content-Type': 'application/octet-stream'
                },
                body: blobOrString
            });
            if (!res.ok) throw new Error(`Dropbox upload ${rel}: ${res.status}`);
            return res.json();
        }

        async function dbxReadBlob(rel) {
            const res = await dbxFetch('https://content.dropboxapi.com/2/files/download', {
                method: 'POST',
                headers: { 'Dropbox-API-Arg': JSON.stringify({ path: libPath(rel) }) }
            });
            if (!res.ok) throw new Error(`Dropbox download ${rel}: ${res.status}`);
            return res.blob();
        }

        async function dbxReadJson(rel) {
            const blob = await dbxReadBlob(rel);
            return JSON.parse(await blob.text());
        }

        async function dbxDelete(rel) {
            const res = await dbxFetch('https://api.dropboxapi.com/2/files/delete_v2', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: libPath(rel) })
            });
            if (!res.ok && res.status !== 409) throw new Error(`Dropbox delete ${rel}: ${res.status}`);
        }

                    await loadLibraryIndex();

                    const ok = await refreshDropboxToken();
                    if (ok) {

        // BÚSQUEDA EN PUBMED (El motor pesado)
        async function fetchArticles(isManual = true) {
            showingFavorites = false;
            document.getElementById('btnViewFavs').classList.remove('text-amber-500', 'font-bold');
            document.getElementById('sidebarControls').classList.remove('opacity-50', 'pointer-events-none');

            const selection = document.getElementById('journalSelect').value;
            const subspecKey = document.getElementById('subspecSelect').value;
            const max = document.getElementById('maxResults').value;
            const timeFilter = document.getElementById('timeFilter').value;
            const statusArea = document.getElementById('statusArea');
            const container = document.getElementById('resultsContainer');
            
            // 1. Construir Bloque de Revistas
            let queryTerm = selection === "ALL" ? `("Abdom Radiol (NY)"[jour] OR "Radiology"[jour] OR "RadioGraphics"[jour] OR "AJR Am J Roentgenol"[jour] OR "Eur Radiol"[jour] OR "Radiol Clin North Am"[jour] OR "Radiologia"[jour] OR "Radiologia(Engl Ed)"[jour] OR "Can Assoc Radiol J"[jour] OR "Br J Radiol"[jour])` : selection;
            
            // 2. Acoplar Bloque de Subespecialidad si lo hay
            if (subspecKey !== "NONE" && subspecQueries[subspecKey]) {
                queryTerm = `(${queryTerm}) ${subspecQueries[subspecKey]}`;
            }

            // 3. Añadir Bloque de Tiempo
            let dateTerm = "";
            if (timeFilter === "30days") {
                dateTerm = "&reldate=30&datetype=pdat";
            } else if (timeFilter === "specific") {
                const year = document.getElementById('yearSelect').value;
                const month = document.getElementById('monthSelect').value;
                dateTerm = `&mindate=${year}/${month}/01&maxdate=${year}/${month}/31&datetype=pdat`;
            }

            container.innerHTML = '';
            statusArea.innerHTML = `<div class="loader"></div> Buscando en PubMed...`;

            const keyParam = NCBI_API_KEY ? `&api_key=${NCBI_API_KEY}` : "";

            try {
                const searchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(queryTerm + " AND (hasabstract[text])")}&retmode=json&retmax=${max}&sort=date${dateTerm}${keyParam}`;
                const searchRes = await fetch(searchUrl);
                if (!searchRes.ok) throw new Error("esearch " + searchRes.status);
                const searchData = await searchRes.json();
                const idList = searchData.esearchresult?.idlist || [];

                if (idList.length === 0) {
                    statusArea.innerHTML = `<i class="fa-solid fa-circle-exclamation text-amber-500"></i> No se encontraron resultados con este filtro de subespecialidad/tiempo. Intenta ampliarlo.`;
                    return;
                }

                statusArea.innerHTML = `<div class="loader"></div> Descargando metadatos de ${idList.length} artículos...`;

                // Trocear en lotes para no superar límites de longitud de URL ni de tasa de NCBI.
                currentArticles = [];
                const parser = new DOMParser();

                for (let i = 0; i < idList.length; i += EFETCH_BATCH_SIZE) {
                    const batch = idList.slice(i, i + EFETCH_BATCH_SIZE);
                    const fetchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pubmed&id=${batch.join(',')}&retmode=xml${keyParam}`;
                    const fetchRes = await fetch(fetchUrl);
                    if (!fetchRes.ok) throw new Error("efetch " + fetchRes.status);
                    const xmlText = await fetchRes.text();

                    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                    const articlesXML = xmlDoc.querySelectorAll("PubmedArticle");

                    articlesXML.forEach(art => {
                        const pmid = art.querySelector("PMID")?.textContent || "";
                        const title = art.querySelector("ArticleTitle")?.textContent || "Sin título";
                        // Un artículo puede tener varios AbstractText (Background/Methods/Results...): concatenarlos.
                        const abstractNodes = art.querySelectorAll("Abstract AbstractText");
                        let abstract = "Resumen no disponible.";
                        if (abstractNodes.length > 0) {
                            abstract = Array.from(abstractNodes).map(n => {
                                const label = n.getAttribute("Label");
                                return (label ? label + ": " : "") + n.textContent;
                            }).join(" ");
                        }
                        let journalTitle = art.querySelector("ISOAbbreviation")?.textContent || art.querySelector("Journal Title")?.textContent || "Revista";

                        let doi = "";
                        art.querySelectorAll("ArticleId").forEach(id => {
                            if (id.getAttribute("IdType") === "doi") doi = id.textContent;
                        });

                        const year = art.querySelector("PubDate Year")?.textContent || "";
                        const month = art.querySelector("PubDate Month")?.textContent || "";
                        const isHighImpact = highImpactRegex.test(title) || highImpactRegex.test(abstract);

                        currentArticles.push({ pmid, title, abstract, doi, journal: journalTitle, date: `${month} ${year}`.trim(), year: year, highImpact: isHighImpact });
                    });

                    // Mantener el orden por fecha si NCBI devuelve los lotes desordenados no es problema:
                    // idList ya viene ordenado por fecha y procesamos en ese orden.
                    if (idList.length > EFETCH_BATCH_SIZE) {
                        statusArea.innerHTML = `<div class="loader"></div> Descargando metadatos... (${Math.min(i + EFETCH_BATCH_SIZE, idList.length)}/${idList.length})`;
                    }
                }

                statusArea.innerHTML = `<i class="fa-solid fa-circle-check text-green-500"></i> Búsqueda completada (${currentArticles.length} resultados filtrados desde PubMed).`;
                renderArticles();

            } catch (error) {
                statusArea.innerHTML = `<i class="fa-solid fa-circle-xmark text-red-500"></i> Error de conexión con PubMed (${error.message}).`;
            }
        }

        // ============================================================
        // BIBLIOTECA EN DROPBOX (funciona en cualquier dispositivo, incluido iPad)
        // Estructura dentro de la carpeta de la app (Dropbox/Aplicaciones/<nombre-app>/):
        //   index.json              -> índice ligero de toda la biblioteca
        //   papers/<pmid>/meta.json -> metadata + notas + estado de ese artículo
        //   papers/<pmid>/paper.pdf -> el PDF (si está disponible)
        // ============================================================

        async function connectLibraryFolder() {
            if (!DROPBOX_APP_KEY) {
                alert('Falta configurar DROPBOX_APP_KEY en el código.\n\nAbre el archivo y sigue las instrucciones del bloque "DROPBOX" al inicio del script (registro gratuito en dropbox.com/developers/apps, 2 minutos).');
                return;
            }
            if (window.location.protocol === 'file:') {
                alert('El login de Dropbox no funciona abriendo el archivo en local (file://).\nSube el HTML a GitHub Pages (o similar) y accede por su URL https.');
                return;
            }
            await startDropboxLogin(); // redirige a Dropbox; al volver, tryReconnectLibrary procesa el código
        }

        async function loadLibraryIndex() {
            try {
                libraryIndex = await dbxReadJson('index.json');
                if (!Array.isArray(libraryIndex)) libraryIndex = [];
            } catch (e) {
                // index.json no existe todavía: primera vez. Crearlo vacío.
                libraryIndex = [];
                await saveLibraryIndex();
            }
        }

        async function saveLibraryIndex() {
            await dbxWriteFile('index.json', JSON.stringify(libraryIndex, null, 2));
        }

        function updateLibraryCounter() {
            const el = document.getElementById('libCountHeader');
            if (el) el.innerText = libraryIndex.length;
        }

        function isInLibrary(pmid) {
            return libraryIndex.some(p => p.pmid === pmid);
        }

        async function addToLibrary(pmid) {
            if (!libraryConnected()) {
                alert('Primero inicia sesión con tu cuenta de Dropbox desde la pestaña "📚 Biblioteca".');
                return;
            }
            if (isInLibrary(pmid)) return;

            const art = currentArticles.find(a => a.pmid === pmid) || savedFavorites.find(a => a.pmid === pmid);
            if (!art) return;

            const btn = document.getElementById(`lib-btn-${pmid}`);
            if (btn) { btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`; btn.disabled = true; }

            try {
                let hasPdf = false, pdfSource = null;
                const pdfUrl = oaPdfUrlCache[pmid];
                if (pdfUrl) {
                    try {
                        const pdfRes = await fetch(pdfUrl);
                        if (pdfRes.ok) {
                            const blob = await pdfRes.blob();
                            await dbxWriteFile(`papers/${pmid}/paper.pdf`, blob);
                            hasPdf = true;
                            pdfSource = 'unpaywall';
                        }
                    } catch (e) {
                        // Algunos editores bloquean la descarga directa por CORS: se guarda solo la metadata
                        // y el usuario puede subir el PDF manualmente después desde el panel de lectura.
                    }
                }

                const meta = {
                    pmid, title: art.title, journal: art.journal, year: art.year, doi: art.doi || '',
                    status: 'to-read', tags: [], notes: '',
                    dateAdded: new Date().toISOString(), hasPdf, pdfSource
                };
                await dbxWriteFile(`papers/${pmid}/meta.json`, JSON.stringify(meta, null, 2));

                libraryIndex.push(meta);
                await saveLibraryIndex();
                updateLibraryCounter();

                if (btn) {
                    btn.innerHTML = `<i class="fa-solid fa-circle-check"></i>`;
                    btn.classList.remove('text-slate-400', 'dark:text-slate-500');
                    btn.classList.add('text-emerald-500');
                    btn.title = hasPdf ? 'En tu biblioteca (PDF guardado)' : 'En tu biblioteca (sin PDF)';
                }
            } catch (e) {
                if (btn) { btn.innerHTML = `<i class="fa-solid fa-folder-plus"></i>`; btn.disabled = false; }
                alert('No se pudo añadir a la biblioteca: ' + e.message);
            }
        }

        async function removeFromLibrary(pmid) {
            if (!confirm('¿Eliminar este artículo y su PDF de tu Dropbox? No se puede deshacer.')) return;
            try {
                await dbxDelete(`papers/${pmid}`);
            } catch (e) { /* puede que ya no exista la subcarpeta; seguimos limpiando el índice */ }
            libraryIndex = libraryIndex.filter(p => p.pmid !== pmid);
            await saveLibraryIndex();
            updateLibraryCounter();
            closeReader();
            renderLibrary();
        }

        async function updateLibraryEntry(pmid, changes) {
            const entry = libraryIndex.find(p => p.pmid === pmid);
            if (!entry) return;
            Object.assign(entry, changes);
            await saveLibraryIndex();
            try {
                await dbxWriteFile(`papers/${pmid}/meta.json`, JSON.stringify(entry, null, 2));
            } catch (e) { /* el índice general ya quedó actualizado aunque falle el meta.json individual */ }
        }

        }

        function toggleViewLibrary() {
            showingLibrary = !showingLibrary;
            showingFavorites = false;
            const btnLib = document.getElementById('btnViewLib');
            const btnFav = document.getElementById('btnViewFavs');
            const sidebar = document.getElementById('sidebarControls');
            const searchContainer = document.getElementById('resultsContainer');
            const libContainer = document.getElementById('libraryContainer');
            const statusArea = document.getElementById('statusArea');

            btnFav.classList.remove('text-amber-500', 'dark:text-amber-400', 'font-bold');

            if (showingLibrary) {
                btnLib.classList.add('text-blue-600', 'dark:text-blue-400', 'font-bold');
                sidebar.classList.add('opacity-50', 'pointer-events-none');
                searchContainer.classList.add('hidden');
                libContainer.classList.remove('hidden');
                statusArea.innerHTML = `<i class="fa-solid fa-book-open text-blue-500"></i> Tu biblioteca en Dropbox.`;
                renderLibrary();
            } else {
                btnLib.classList.remove('text-blue-600', 'dark:text-blue-400', 'font-bold');
                sidebar.classList.remove('opacity-50', 'pointer-events-none');
                searchContainer.classList.remove('hidden');
                libContainer.classList.add('hidden');
                statusArea.innerHTML = `<i class="fa-solid fa-layer-group text-blue-500"></i> Búsqueda general.`;
            }
        }

        function setLibraryFilter(status) {
            libraryStatusFilter = status;
            renderLibrary();
        }

        function renderLibrary() {
            const container = document.getElementById('libraryContainer');
            if (!libraryConnected()) {
                const setupWarning = !DROPBOX_APP_KEY ? `
                        <div class="text-xs text-amber-600 dark:text-amber-400 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-lg p-3 mt-4 text-left max-w-md mx-auto">
                            <i class="fa-solid fa-triangle-exclamation mr-1"></i> <strong>Configuración pendiente:</strong> falta el <code>DROPBOX_APP_KEY</code> en el código. Abre el archivo y sigue las instrucciones del bloque "DROPBOX" (registro gratuito en dropbox.com/developers/apps, 2 minutos, solo una vez).
                        </div>` : '';
                container.innerHTML = `
                    <div class="p-10 text-center bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">
                        <i class="fa-brands fa-dropbox text-4xl text-slate-300 dark:text-slate-600 mb-4"></i>
                        <p class="text-slate-600 dark:text-slate-300 mb-4">Inicia sesión con tu cuenta de Dropbox para acceder a tu biblioteca desde cualquier dispositivo, incluido el iPad.</p>
                        <button onclick="connectLibraryFolder()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg transition-colors shadow-sm">
                            <i class="fa-brands fa-dropbox mr-2"></i>Iniciar sesión con Dropbox
                        </button>
                        ${setupWarning}
                    </div>`;
                return;
            }

            const statusLabels = { 'to-read': 'Por leer', 'reading': 'Leyendo', 'read': 'Leído' };
            const statusStyles = {
                'to-read': 'bg-slate-100 text-slate-700 border-slate-200 dark:bg-slate-700 dark:text-slate-300 dark:border-slate-600',
                'reading': 'bg-blue-100 text-blue-700 border-blue-200 dark:bg-blue-900/30 dark:text-blue-300 dark:border-blue-800',
                'read': 'bg-emerald-100 text-emerald-700 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-300 dark:border-emerald-800'
            };

            // Filtro combinado: estado + tags activos (OR entre tags) + texto libre
            const q = (libSearchQuery || '').toLowerCase();
            const filtered = libraryIndex.filter(p => {
                if (libraryStatusFilter !== 'all' && p.status !== libraryStatusFilter) return false;
                if (activeLibTags.size > 0 && !(p.tags || []).some(t => activeLibTags.has(t))) return false;
                if (q && !(`${p.title} ${p.journal} ${p.notes || ''} ${(p.tags || []).join(' ')}`.toLowerCase().includes(q))) return false;
                return true;
            });

            // Todos los tags en uso en la biblioteca (predefinidos primero, luego personalizados)
            const usedTags = [...new Set(libraryIndex.flatMap(p => p.tags || []))];
            const orderedTags = [...tags.filter(t => usedTags.includes(t)), ...usedTags.filter(t => !tags.includes(t))];

            let html = `<div class="flex flex-wrap items-center gap-2 mb-3">
                ${['all', 'to-read', 'reading', 'read'].map(s => `
                    <button onclick="setLibraryFilter('${s}')" class="chip ${libraryStatusFilter === s ? 'active' : ''} px-3 py-1.5 rounded-lg text-sm font-medium border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-300">
                        ${s === 'all' ? 'Todos' : statusLabels[s]} (${s === 'all' ? libraryIndex.length : libraryIndex.filter(p => p.status === s).length})
                    </button>`).join('')}
                <input type="text" value="${(libSearchQuery || '').replace(/"/g, '&quot;')}" oninput="setLibrarySearch(this.value)" placeholder="Buscar en título, notas, tags..." class="flex-1 min-w-[180px] border border-slate-300 dark:border-slate-600 rounded-lg px-3 py-1.5 bg-white dark:bg-slate-700 text-sm outline-none dark:text-white">
                <button onclick="signOutLibrary()" class="text-sm text-slate-500 dark:text-slate-400 hover:text-red-500 dark:hover:text-red-400 px-3 py-1.5" title="Cerrar sesión de Dropbox">
                    <i class="fa-solid fa-right-from-bracket mr-1"></i>Cerrar sesión
                </button>
            </div>`;

            if (orderedTags.length > 0) {
                html += `<div class="flex flex-wrap items-center gap-1.5 mb-5">
                    <span class="text-[11px] text-slate-400 dark:text-slate-500 mr-1"><i class="fa-solid fa-tags"></i></span>
                    ${orderedTags.map(t => {
                        const active = activeLibTags.has(t);
                        const count = libraryIndex.filter(p => (p.tags || []).includes(t)).length;
                        return `<button onclick="toggleLibTag('${t.replace(/'/g, "\\'")}')" class="px-2.5 py-1 text-[11px] rounded-full border transition-colors ${active
                            ? 'bg-blue-600 text-white border-blue-600'
                            : 'bg-white dark:bg-slate-700 text-slate-500 dark:text-slate-300 border-slate-300 dark:border-slate-600 hover:border-blue-400'}">${t} <span class="opacity-60">${count}</span></button>`;
                    }).join('')}
                    ${activeLibTags.size > 0 ? `<button onclick="clearLibTags()" class="text-[11px] text-slate-400 hover:text-red-500 px-2 py-1"><i class="fa-solid fa-xmark mr-0.5"></i>Limpiar</button>` : ''}
                </div>`;
            }

            if (filtered.length === 0) {
                html += `<div class="p-8 text-center text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">No hay artículos en esta categoría todavía.</div>`;
            } else {
                html += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">`;
                filtered.forEach(p => {
                    html += `
                        <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col gap-2 cursor-pointer hover:shadow-md transition-shadow" onclick="openReader('${p.pmid}')">
                            <div class="flex items-start justify-between gap-2">
                                <h4 class="font-semibold text-sm text-slate-800 dark:text-white leading-snug flex-1">${p.title}</h4>
                                ${p.hasPdf ? '<i class="fa-solid fa-file-pdf text-red-500" title="PDF guardado localmente"></i>' : '<i class="fa-regular fa-file text-slate-300 dark:text-slate-600" title="Sin PDF guardado"></i>'}
                            </div>
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="text-xs text-slate-500 dark:text-slate-400">${p.journal} · ${p.year}</span>
                                <span class="px-2 py-0.5 text-[10px] font-bold rounded border ${statusStyles[p.status]}">${statusLabels[p.status]}</span>
                                ${(p.highlights && p.highlights.length) ? `<span class="text-[10px] text-amber-600 dark:text-amber-400"><i class="fa-solid fa-highlighter"></i> ${p.highlights.length}</span>` : ''}
                            </div>
                            ${p.tags && p.tags.length ? `<div class="flex flex-wrap gap-1">${p.tags.map(t => `<span class="text-[10px] bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-1.5 py-0.5 rounded">${t}</span>`).join('')}</div>` : ''}
                            ${p.notes ? `<p class="text-xs text-slate-500 dark:text-slate-400 italic line-clamp-2">"${p.notes.replace(/"/g, '&quot;')}"</p>` : ''}
                        </div>`;
                });
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        async function signOutLibrary() {
            if (!confirm('¿Cerrar sesión de Dropbox en este dispositivo? Tu biblioteca en Dropbox no se borra.')) return;
            try {
                await dbxFetch('https://api.dropboxapi.com/2/auth/token/revoke', { method: 'POST' });
            } catch (e) { /* si falla la revocación remota, limpiamos igualmente el estado local */ }
            localStorage.removeItem('dbx_refresh_token');
            dbxAccessToken = null; libraryIndex = [];
            updateLibraryCounter();
            renderLibrary();
        }

        // ============================================================
        // PANEL DE LECTURA: PDF.js (render + selección) y pdf-lib (escritura
        // de subrayados como anotaciones reales dentro del PDF de Dropbox)
        // ============================================================
        let readerCurrentPmid = null;
        let readerPdfBytes = null;      // ArrayBuffer del PDF actual
        let readerPdfDoc = null;        // Documento PDF.js
        let readerScale = 1.2;
        let readerViewports = [];       // Viewport por página al scale actual
        let readerHighlightsDirty = false;
        let readerRenderToken = 0;      // Cancela renders obsoletos al cambiar de zoom/artículo

        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        function currentEntry() { return libraryIndex.find(p => p.pmid === readerCurrentPmid); }

        async function openReader(pmid) {
            readerCurrentPmid = pmid;
            readerHighlightsDirty = false;
            const entry = libraryIndex.find(p => p.pmid === pmid);
            if (!entry) return;
            if (!Array.isArray(entry.highlights)) entry.highlights = [];

            document.getElementById('readerModal').classList.remove('hidden');
            document.getElementById('readerTitle').innerText = entry.title;
            document.getElementById('readerMeta').innerText = `${entry.journal} · ${entry.year}${entry.doi ? ' · DOI: ' + entry.doi : ''}`;
            document.getElementById('readerNotes').value = entry.notes || '';
            document.getElementById('readerStatus').value = entry.status;
            renderReaderTagChips(entry);
            renderHighlightsList(entry);

            const pdfPane = document.getElementById('readerPdfPane');
            if (entry.hasPdf) {
                pdfPane.innerHTML = `<div class="flex items-center justify-center h-full text-slate-500 text-sm gap-2"><div class="loader"></div> Descargando PDF de Dropbox...</div>`;
                try {
                    const rawBlob = await dbxReadBlob(`papers/${pmid}/paper.pdf`);
                    if (readerCurrentPmid !== pmid) return;
                    readerPdfBytes = await rawBlob.arrayBuffer();
                    readerPdfDoc = await pdfjsLib.getDocument({ data: readerPdfBytes.slice(0) }).promise;
                    if (readerCurrentPmid !== pmid) return;
                    await pdfFitWidth();
                } catch (e) {
                    pdfPane.innerHTML = `<div class="flex items-center justify-center h-full text-slate-400 text-sm px-6 text-center">No se pudo cargar el PDF: ${e.message}</div>`;
                }
            } else {
                readerPdfBytes = null; readerPdfDoc = null;
                pdfPane.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full gap-3 text-center px-6">
                        <i class="fa-regular fa-file-pdf text-4xl text-slate-300 dark:text-slate-600"></i>
                        <p class="text-sm text-slate-500 dark:text-slate-400">No hay PDF guardado para este artículo.</p>
                        <label class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg cursor-pointer transition-colors">
                            <i class="fa-solid fa-upload mr-1"></i> Subir PDF
                            <input type="file" accept="application/pdf" class="hidden" onchange="uploadPdfManually('${pmid}', this)">
                        </label>
                        ${entry.doi ? `<a href="https://doi.org/${entry.doi}" target="_blank" class="text-xs text-blue-500 hover:underline">Buscar acceso en doi.org</a>` : ''}
                    </div>`;
            }
        }

        async function renderPdfPages() {
            const token = ++readerRenderToken;
            const pane = document.getElementById('readerPdfPane');
            pane.innerHTML = '';
            readerViewports = [];
            document.getElementById('zoomLevel').innerText = Math.round(readerScale * 100) + '%';
            const entry = currentEntry();

            for (let n = 1; n <= readerPdfDoc.numPages; n++) {
                if (token !== readerRenderToken) return; // render obsoleto: abortar
                const page = await readerPdfDoc.getPage(n);
                const viewport = page.getViewport({ scale: readerScale });
                readerViewports[n] = viewport;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'pdf-page';
                pageDiv.dataset.page = n;
                pageDiv.style.width = viewport.width + 'px';
                pageDiv.style.height = viewport.height + 'px';

                const canvas = document.createElement('canvas');
                // Render a mayor resolución en pantallas retina para nitidez
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = viewport.width * dpr;
                canvas.height = viewport.height * dpr;
                canvas.style.width = viewport.width + 'px';
                canvas.style.height = viewport.height + 'px';
                pageDiv.appendChild(canvas);

                const textDiv = document.createElement('div');
                textDiv.className = 'textLayer';
                textDiv.style.setProperty('--scale-factor', readerScale);
                pageDiv.appendChild(textDiv);

                pane.appendChild(pageDiv);

                const ctx = canvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport, transform: dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null }).promise;
                if (token !== readerRenderToken) return;

                const textContent = await page.getTextContent();
                pdfjsLib.renderTextLayer({ textContentSource: textContent, container: textDiv, viewport, textDivs: [] });

                drawPageHighlights(pageDiv, n, entry);
            }
        }

        function drawPageHighlights(pageDiv, pageNum, entry) {
            pageDiv.querySelectorAll('.hl-overlay').forEach(el => el.remove());
            const viewport = readerViewports[pageNum];
            (entry.highlights || []).forEach((hl, idx) => {
                if (hl.page !== pageNum) return;
                hl.quads.forEach(q => {
                    // quad: [x1,yTop, x2,yTop, x1,yBottom, x2,yBottom] en espacio PDF
                    const [vx1, vy1] = viewport.convertToViewportPoint(q[0], q[1]);
                    const [vx2, vy2] = viewport.convertToViewportPoint(q[6], q[7]);
                    const div = document.createElement('div');
                    div.className = 'hl-overlay';
                    div.style.left = Math.min(vx1, vx2) + 'px';
                    div.style.top = Math.min(vy1, vy2) + 'px';
                    div.style.width = Math.abs(vx2 - vx1) + 'px';
                    div.style.height = Math.abs(vy2 - vy1) + 'px';
                    div.title = 'Clic para borrar este subrayado';
                    div.onclick = (ev) => { ev.stopPropagation(); deleteHighlight(idx); };
                    pageDiv.appendChild(div);
                });
            });
        }

        function refreshAllHighlightOverlays() {
            const entry = currentEntry();
            document.querySelectorAll('#readerPdfPane .pdf-page').forEach(pageDiv => {
                drawPageHighlights(pageDiv, parseInt(pageDiv.dataset.page), entry);
            });
            renderHighlightsList(entry);
        }

        // --- Captura de selección de texto → nuevo subrayado ---
        document.addEventListener('pointerup', () => {
            if (!readerPdfDoc || document.getElementById('readerModal').classList.contains('hidden')) return;
            const sel = window.getSelection();
            if (!sel || sel.isCollapsed || !sel.rangeCount) return;
            const text = sel.toString().trim();
            if (!text) return;

            const range = sel.getRangeAt(0);
            // Comprobar que la selección está dentro del panel del PDF
            const pane = document.getElementById('readerPdfPane');
            if (!pane.contains(range.commonAncestorContainer)) return;

            const rects = Array.from(range.getClientRects()).filter(r => r.width > 2 && r.height > 3);
            if (!rects.length) return;

            // Agrupar rects por página y convertir a coordenadas PDF
            const byPage = {};
            document.querySelectorAll('#readerPdfPane .pdf-page').forEach(pageDiv => {
                const pRect = pageDiv.getBoundingClientRect();
                const pageNum = parseInt(pageDiv.dataset.page);
                rects.forEach(r => {
                    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
                    if (cx >= pRect.left && cx <= pRect.right && cy >= pRect.top && cy <= pRect.bottom) {
                        const vp = readerViewports[pageNum];
                        const [x1, yT] = vp.convertToPdfPoint(r.left - pRect.left, r.top - pRect.top);
                        const [x2, yB] = vp.convertToPdfPoint(r.right - pRect.left, r.bottom - pRect.top);
                        (byPage[pageNum] = byPage[pageNum] || []).push([x1, yT, x2, yT, x1, yB, x2, yB]);
                    }
                });
            });

            const entry = currentEntry();
            let added = false;
            for (const [pageNum, quads] of Object.entries(byPage)) {
                entry.highlights.push({ page: parseInt(pageNum), quads, text });
                added = true;
            }
            if (added) {
                readerHighlightsDirty = true;
                sel.removeAllRanges();
                refreshAllHighlightOverlays();
            }
        });

        function deleteHighlight(idx) {
            const entry = currentEntry();
            if (!confirm('¿Borrar este subrayado?')) return;
            entry.highlights.splice(idx, 1);
            readerHighlightsDirty = true;
            refreshAllHighlightOverlays();
        }

        function renderHighlightsList(entry) {
            const section = document.getElementById('readerHighlightsSection');
            const list = document.getElementById('readerHighlights');
            const hls = entry.highlights || [];
            section.classList.toggle('hidden', hls.length === 0);
            list.innerHTML = hls.map((h, i) => `
                <div class="text-[11px] bg-amber-50 dark:bg-amber-900/20 border-l-2 border-amber-400 rounded-r px-2 py-1 text-slate-600 dark:text-slate-300 flex items-start gap-1">
                    <span class="text-slate-400 shrink-0">p.${h.page}</span>
                    <span class="flex-1">"${h.text.length > 120 ? h.text.slice(0, 120) + '…' : h.text}"</span>
                    <button onclick="deleteHighlight(${i})" class="text-slate-400 hover:text-red-500 shrink-0" title="Borrar"><i class="fa-solid fa-xmark"></i></button>
                </div>`).join('');
        }

        // --- Escritura de subrayados como anotaciones reales en el PDF (pdf-lib) ---
        async function persistHighlightsToPdf() {
            const entry = currentEntry();
            if (!readerPdfBytes || !entry) return;
            const { PDFDocument, PDFName, PDFString } = PDFLib;
            const doc = await PDFDocument.load(readerPdfBytes);
            const pages = doc.getPages();
            const OUR_TAG = 'PaperLibrary';

            pages.forEach((page, i) => {
                const pageNum = i + 1;
                // 1) Quitar anotaciones nuestras previas (identificadas por /T) para no duplicar
                const annotsRef = page.node.get(PDFName.of('Annots'));
                const kept = [];
                if (annotsRef) {
                    const annots = page.node.lookup(PDFName.of('Annots'));
                    for (let j = 0; j < annots.size(); j++) {
                        const dict = annots.lookup(j);
                        const t = dict && dict.get && dict.get(PDFName.of('T'));
                        if (!(t && t.decodeText && t.decodeText() === OUR_TAG)) kept.push(annots.get(j));
                    }
                }
                // 2) Añadir las actuales de esta página
                const pageHls = entry.highlights.filter(h => h.page === pageNum);
                pageHls.forEach(h => {
                    const flat = h.quads.flat();
                    const xs = flat.filter((_, k) => k % 2 === 0), ys = flat.filter((_, k) => k % 2 === 1);
                    const annot = doc.context.obj({
                        Type: 'Annot', Subtype: 'Highlight',
                        Rect: [Math.min(...xs), Math.min(...ys), Math.max(...xs), Math.max(...ys)],
                        QuadPoints: flat,
                        C: [1, 0.84, 0.31], CA: 0.45, F: 4,
                        T: PDFString.of(OUR_TAG),
                        Contents: PDFString.of(h.text.slice(0, 500))
                    });
                    kept.push(doc.context.register(annot));
                });
                page.node.set(PDFName.of('Annots'), doc.context.obj(kept));
            });

            const newBytes = await doc.save();
            readerPdfBytes = newBytes.buffer.slice(newBytes.byteOffset, newBytes.byteOffset + newBytes.byteLength);
            await dbxWriteFile(`papers/${entry.pmid}/paper.pdf`, new Blob([newBytes], { type: 'application/pdf' }));
            readerHighlightsDirty = false;
        }

        // --- Zoom y ajuste ---
        async function pdfZoom(delta) {
            if (!readerPdfDoc) return;
            readerScale = Math.min(3, Math.max(0.5, readerScale + delta));
            await renderPdfPages();
        }
        async function pdfFitWidth() {
            if (!readerPdfDoc) return;
            const pane = document.getElementById('readerPdfPane');
            const page1 = await readerPdfDoc.getPage(1);
            const baseW = page1.getViewport({ scale: 1 }).width;
            readerScale = Math.max(0.5, (pane.clientWidth - 32) / baseW);
            await renderPdfPages();
        }
        function toggleSidePane() {
            document.getElementById('readerSidePane').classList.toggle('hidden');
            document.getElementById('readerSplitter').classList.toggle('hidden');
            if (readerPdfDoc) pdfFitWidth();
        }

        // --- Splitter arrastrable (ratón y táctil) ---
        (function initSplitter() {
            const splitter = document.getElementById('readerSplitter');
            const side = document.getElementById('readerSidePane');
            let dragging = false;
            splitter.addEventListener('pointerdown', (e) => { dragging = true; splitter.setPointerCapture(e.pointerId); });
            splitter.addEventListener('pointermove', (e) => {
                if (!dragging) return;
                const body = document.getElementById('readerBody').getBoundingClientRect();
                const w = Math.min(Math.max(body.right - e.clientX, 220), body.width * 0.6);
                side.style.width = w + 'px';
            });
            splitter.addEventListener('pointerup', () => {
                dragging = false;
                localStorage.setItem('readerSideW', side.style.width);
                if (readerPdfDoc) pdfFitWidth();
            });
            const saved = localStorage.getItem('readerSideW');
            if (saved) side.style.width = saved;
        })();

        // --- Tags predefinidos clicables (reutiliza la lista de tags del dashboard) ---
        function renderReaderTagChips(entry) {
            const container = document.getElementById('readerTagChips');
            const entryTags = new Set(entry.tags || []);
            container.innerHTML = tags.map(t => {
                const active = entryTags.has(t);
                return `<button onclick="toggleReaderTag('${t.replace(/'/g, "\'")}')" class="px-2 py-0.5 text-[10px] rounded-full border transition-colors ${active
                    ? 'bg-blue-600 text-white border-blue-600'
                    : 'bg-slate-50 dark:bg-slate-700 text-slate-500 dark:text-slate-300 border-slate-300 dark:border-slate-600 hover:border-blue-400'}">${t}</button>`;
            }).join('');
            // El input de texto libre muestra solo los tags que no son predefinidos
            document.getElementById('readerTags').value = (entry.tags || []).filter(t => !tags.includes(t)).join(', ');
        }
        function toggleReaderTag(tag) {
            const entry = currentEntry();
            if (!entry.tags) entry.tags = [];
            const i = entry.tags.indexOf(tag);
            if (i >= 0) entry.tags.splice(i, 1); else entry.tags.push(tag);
            renderReaderTagChips(entry);
        }

        async function closeReader() {
            const entry = currentEntry();
            document.getElementById('readerModal').classList.add('hidden');
            // Auto-guardar subrayados pendientes al cerrar
            if (readerHighlightsDirty && entry) {
                try {
                    await updateLibraryEntry(entry.pmid, { highlights: entry.highlights });
                    await persistHighlightsToPdf();
                } catch (e) {
                    alert('No se pudieron guardar los subrayados en Dropbox: ' + e.message);
                }
            }
            readerRenderToken++;
            document.getElementById('readerPdfPane').innerHTML = '';
            readerCurrentPmid = null; readerPdfDoc = null; readerPdfBytes = null;
            renderLibrary();
        }

        async function saveReaderChanges() {
            const entry = currentEntry();
            if (!entry) return;
            const notes = document.getElementById('readerNotes').value;
            const status = document.getElementById('readerStatus').value;
            const freeTags = document.getElementById('readerTags').value.split(',').map(t => t.trim()).filter(Boolean);
            const chipTags = (entry.tags || []).filter(t => tags.includes(t));
            const allTags = [...new Set([...chipTags, ...freeTags])];

            const btn = document.getElementById('readerSaveBtn');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1"></i> Guardando...`;

            try {
                await updateLibraryEntry(entry.pmid, { notes, status, tags: allTags, highlights: entry.highlights || [] });
                if (readerHighlightsDirty) await persistHighlightsToPdf();
                btn.innerHTML = `<i class="fa-solid fa-check mr-1"></i> Guardado`;
            } catch (e) {
                btn.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1"></i> Error`;
                alert('Error al guardar: ' + e.message);
            }
            setTimeout(() => { btn.innerHTML = `<i class="fa-solid fa-floppy-disk mr-1"></i> Guardar`; }, 1500);
        }

        // ============================================================
        // INTELIGENCIA SOBRE LA LITERATURA (API de Claude)
        // Opción C: usa la API embebida de artifacts, que SOLO funciona dentro
        // de claude.ai. En GitHub Pages muestra un aviso (haría falta API key propia).
        // ============================================================
        const AI_MODEL = "claude-sonnet-4-6";

        // Detecta si estamos dentro de claude.ai (donde la API embebida funciona sin key)
        function aiAvailable() {
            return /claude\.ai|claudeusercontent\.com|anthropic/.test(window.location.hostname);
        }

        function aiUnavailableNotice() {
            return `<div class="p-4 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-lg text-sm text-amber-800 dark:text-amber-300">
                <i class="fa-solid fa-circle-info mr-1"></i> <strong>Función de IA no disponible aquí.</strong>
                El resumen inteligente usa la API de Claude, que solo funciona dentro de claude.ai (como artifact).
                Para usarla en tu sitio de GitHub Pages hace falta configurar una API key propia de Anthropic
                — dímelo cuando quieras y lo añadimos.
            </div>`;
        }

        // Llamada a la API embebida de Anthropic (disponible dentro de artifacts de claude.ai)
        async function callClaude(prompt, maxTokens = 1024) {
            const response = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: AI_MODEL,
                    max_tokens: maxTokens,
                    messages: [{ role: "user", content: prompt }]
                })
            });
            if (!response.ok) throw new Error("API " + response.status);
            const data = await response.json();
            return data.content.filter(b => b.type === "text").map(b => b.text).join("\n").trim();
        }

        // --- TL;DR clínico de un artículo ---
        async function generateTldr(pmid) {
            const art = currentArticles.find(a => a.pmid === pmid) || savedFavorites.find(a => a.pmid === pmid);
            if (!art) return;
            const box = document.getElementById(`tldr-${pmid}`);
            box.classList.remove('hidden');

            if (!aiAvailable()) { box.innerHTML = aiUnavailableNotice(); return; }

            const btn = document.getElementById(`tldr-btn-${pmid}`);
            const prevBtn = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1"></i> Analizando...`;
            btn.disabled = true;
            box.innerHTML = `<div class="p-4 bg-violet-50 dark:bg-violet-900/20 rounded-lg text-sm text-violet-700 dark:text-violet-300 flex items-center gap-2"><div class="loader"></div> Generando resumen clínico...</div>`;

            const prompt = `Eres un radiólogo abdominal consultor senior. Analiza este artículo y da un TL;DR clínico ULTRA conciso para un colega experto que no tiene tiempo. Responde SOLO con este formato exacto, sin preámbulo:

POBLACIÓN: (una línea: qué pacientes/qué modalidad)
HALLAZGO: (una línea: el resultado principal en números si los hay)
VEREDICTO: (una sola palabra en mayúsculas — PRACTICE-CHANGING, ÚTIL, o RUIDO — seguida de media línea justificando por qué)

Título: ${art.title}
Revista: ${art.journal} (${art.year})
Abstract: ${art.abstract}`;

            try {
                const out = await callClaude(prompt, 400);
                box.innerHTML = renderTldr(out);
            } catch (e) {
                box.innerHTML = `<div class="p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-700 dark:text-red-300"><i class="fa-solid fa-triangle-exclamation mr-1"></i> No se pudo generar el resumen (${e.message}).</div>`;
            } finally {
                btn.innerHTML = prevBtn; btn.disabled = false;
            }
        }

        function renderTldr(text) {
            // Colorear el veredicto según su categoría
            let verdictClass = 'text-slate-600 dark:text-slate-300';
            if (/PRACTICE-CHANGING/i.test(text)) verdictClass = 'text-emerald-700 dark:text-emerald-400 font-bold';
            else if (/RUIDO/i.test(text)) verdictClass = 'text-slate-400 dark:text-slate-500';
            else if (/ÚTIL|UTIL/i.test(text)) verdictClass = 'text-blue-700 dark:text-blue-400 font-semibold';

            const lines = text.split('\n').filter(l => l.trim()).map(line => {
                const m = line.match(/^(POBLACIÓN|POBLACION|HALLAZGO|VEREDICTO):(.*)$/i);
                if (m) {
                    const isVerdict = /VEREDICTO/i.test(m[1]);
                    return `<div class="flex gap-2 ${isVerdict ? 'mt-1 pt-2 border-t border-violet-200 dark:border-violet-800' : ''}">
                        <span class="text-[11px] font-bold uppercase tracking-wide text-violet-500 dark:text-violet-400 w-24 shrink-0 pt-0.5">${m[1]}</span>
                        <span class="text-sm ${isVerdict ? verdictClass : 'text-slate-700 dark:text-slate-200'}">${m[2].trim()}</span>
                    </div>`;
                }
                return `<div class="text-sm text-slate-700 dark:text-slate-200">${line}</div>`;
            }).join('');

            return `<div class="p-4 bg-gradient-to-br from-violet-50 to-indigo-50 dark:from-violet-900/20 dark:to-indigo-900/20 rounded-lg border border-violet-200 dark:border-violet-800 flex flex-col gap-1.5">
                <div class="flex items-center gap-1.5 text-[11px] font-bold uppercase tracking-wide text-violet-500 dark:text-violet-400 mb-1">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> TL;DR clínico
                </div>
                ${lines}
            </div>`;
        }

        // --- Resumen semanal ejecutivo de los resultados actuales ---
        async function generateWeeklyBrief() {
            const container = document.getElementById('weeklyBriefContainer');
            container.classList.remove('hidden');
            container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            if (!aiAvailable()) { container.innerHTML = aiUnavailableNotice(); return; }
            if (!currentArticles.length) {
                container.innerHTML = `<div class="p-4 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm text-slate-500">Haz primero una búsqueda: el resumen ejecutivo analiza los resultados en pantalla.</div>`;
                return;
            }

            const btn = document.getElementById('weeklyBtn');
            const prevBtn = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1"></i> Analizando ${currentArticles.length} papers...`;
            btn.disabled = true;
            container.innerHTML = `<div class="p-6 bg-gradient-to-br from-violet-50 to-indigo-50 dark:from-violet-900/20 dark:to-indigo-900/20 rounded-xl border border-violet-200 dark:border-violet-800 flex items-center gap-3 text-violet-700 dark:text-violet-300"><div class="loader"></div> Revisando la literatura de esta semana como lo haría tu fellow...</div>`;

            // Limitar a los primeros 25 para no saturar el contexto
            const subset = currentArticles.slice(0, 25);
            const list = subset.map((a, i) => `[${i + 1}] ${a.title} — ${a.journal} ${a.year}\n${(a.abstract || '').slice(0, 600)}`).join('\n\n');

            const prompt = `Eres el fellow de investigación de un radiólogo abdominal/HPB consultor senior. Te ha pedido un resumen ejecutivo de la literatura reciente. Aquí tienes ${subset.length} artículos nuevos.

Escribe un brief ejecutivo BREVE y directo, en español, con este formato:

**Lo esencial de esta semana** (2-3 frases con el panorama general)

**Merece tu atención:**
- Lista SOLO los papers realmente relevantes (practice-changing o clínicamente importantes para radiología abdominal/HPB). Para cada uno: número [n], una frase de por qué importa. Si alguno contradice o matiza una guía establecida (LI-RADS, estadificación, protocolos), destácalo.

**Puedes ignorar:** (una frase resumiendo qué tipo de papers del resto son ruido o muy de nicho)

Sé selectivo y honesto: si de los ${subset.length} solo 3 merecen atención, di solo 3. No rellenes.

Artículos:
${list}`;

            try {
                const out = await callClaude(prompt, 1500);
                container.innerHTML = `<div class="p-6 bg-gradient-to-br from-violet-50 to-indigo-50 dark:from-violet-900/20 dark:to-indigo-900/20 rounded-xl border border-violet-200 dark:border-violet-800">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-2 text-sm font-bold text-violet-600 dark:text-violet-400"><i class="fa-solid fa-newspaper"></i> Resumen ejecutivo · ${subset.length} papers</div>
                        <button onclick="document.getElementById('weeklyBriefContainer').classList.add('hidden')" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div class="prose-brief text-sm text-slate-700 dark:text-slate-200 leading-relaxed">${formatBrief(out)}</div>
                </div>`;
            } catch (e) {
                container.innerHTML = `<div class="p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-700 dark:text-red-300"><i class="fa-solid fa-triangle-exclamation mr-1"></i> No se pudo generar el resumen (${e.message}).</div>`;
            } finally {
                btn.innerHTML = prevBtn; btn.disabled = false;
            }
        }

        // Formateo ligero de markdown básico (negritas, listas, referencias [n])
        function formatBrief(text) {
            return text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\*\*(.+?)\*\*/g, '<strong class="text-slate-900 dark:text-white">$1</strong>')
                .replace(/\[(\d+)\]/g, '<span class="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 text-[10px] font-bold bg-violet-200 dark:bg-violet-800 text-violet-800 dark:text-violet-200 rounded">$1</span>')
                .replace(/^[-•]\s+(.+)$/gm, '<div class="flex gap-2 my-1"><span class="text-violet-400 shrink-0">›</span><span>$1</span></div>')
                .replace(/\n{2,}/g, '<div class="my-2"></div>')
                .replace(/\n/g, '<br>');
        }

        function renderArticles() {
            const container = document.getElementById('resultsContainer');
            const textQuery = document.getElementById('textFilter').value.toLowerCase();
            container.innerHTML = '';

            let sourceArray = showingFavorites ? savedFavorites : currentArticles;

            currentlyDisplayedFiltered = sourceArray.filter(art => {
                const content = (art.title + " " + art.abstract).toLowerCase();
                if (textQuery && !content.includes(textQuery)) return false;
                if (activeTags.size > 0) {
                    let matchTag = false;
                    for (let tag of activeTags) {
                        if (content.includes(tag.toLowerCase())) { matchTag = true; break; }
                    }
                    if (!matchTag) return false;
                }
                return true;
            });

            if (currentlyDisplayedFiltered.length === 0) {
                container.innerHTML = `<div class="p-8 text-center text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">No hay artículos para mostrar con los filtros actuales.</div>`;
                return;
            }

            currentlyDisplayedFiltered.forEach(art => {
                const isFav = savedFavorites.some(f => f.pmid === art.pmid);
                const favColor = isFav ? "text-amber-500" : "text-slate-400 dark:text-slate-500";
                const favIcon = isFav ? "fa-solid" : "fa-regular";
                const inLib = isInLibrary(art.pmid);
                const borderClass = art.highImpact ? "border-l-4 border-l-red-500 border-t-slate-200 border-r-slate-200 border-b-slate-200 dark:border-t-slate-700 dark:border-r-slate-700 dark:border-b-slate-700" : "border border-slate-200 dark:border-slate-700";
                
                const badge = getJournalBadge(art.journal);

                const card = document.createElement('div');
                card.className = `bg-white dark:bg-slate-800 p-5 rounded-xl shadow-sm ${borderClass} hover:shadow-md transition-shadow relative overflow-hidden`;
                
                card.innerHTML = `
                    <div class="flex flex-col gap-2">
                        <div class="flex items-start justify-between gap-4">
                            <h3 class="font-bold text-slate-800 dark:text-white text-lg leading-tight flex-1">${art.title}</h3>
                            <div class="flex items-center gap-2">
                                <button id="lib-btn-${art.pmid}" onclick="addToLibrary('${art.pmid}')" ${inLib ? 'disabled' : ''} class="text-xl ${inLib ? 'text-emerald-500' : 'text-slate-400 dark:text-slate-500 hover:text-blue-500 dark:hover:text-blue-400'} transition-colors" title="${inLib ? 'En tu biblioteca' : 'Añadir a biblioteca'}">
                                    <i class="fa-solid ${inLib ? 'fa-circle-check' : 'fa-folder-plus'}"></i>
                                </button>
                                <button id="fav-btn-${art.pmid}" onclick="toggleFavorite('${art.pmid}')" class="text-xl ${favColor} hover:text-amber-400 transition-colors" title="Guardar">
                                    <i id="fav-icon-${art.pmid}" class="${favIcon} fa-star"></i>
                                </button>
                            </div>
                        </div>
                        <div class="flex flex-wrap items-center gap-3 mt-1">
                            <span class="bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 text-xs font-semibold px-2.5 py-1 rounded border border-blue-200 dark:border-blue-800">${art.journal}</span>
                            ${badge}
                            <span class="text-xs font-medium text-slate-500 dark:text-slate-400"><i class="fa-regular fa-calendar mr-1"></i>${art.date}</span>
                            ${art.highImpact ? `<span class="bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300 text-xs font-bold px-2 py-0.5 rounded flex items-center"><i class="fa-solid fa-fire mr-1"></i>Alto Impacto</span>` : ''}
                        </div>
                        <div class="text-xs font-medium text-slate-500 dark:text-slate-400 mt-1 flex flex-wrap gap-4">
                            <span>PMID: <a href="https://pubmed.ncbi.nlm.nih.gov/${art.pmid}/" target="_blank" class="text-blue-500 dark:text-blue-400 hover:underline">${art.pmid}</a></span>
                            ${art.doi ? `<span>DOI: ${art.doi}</span>` : ''}
                        </div>
                        
                        <div class="mt-3 hidden" id="abstract-${art.pmid}">
                            <div class="p-4 bg-slate-50 dark:bg-slate-900/50 rounded-lg text-sm text-slate-700 dark:text-slate-300 leading-relaxed border border-slate-100 dark:border-slate-700">
                                <span class="font-semibold text-slate-800 dark:text-white block mb-2">Abstract:</span>
                                ${highlightText(art.abstract)}
                            </div>
                        </div>

                        <div class="mt-3 hidden" id="tldr-${art.pmid}"></div>

                        <div class="flex flex-col lg:flex-row justify-between gap-3 mt-4 pt-4 border-t border-slate-100 dark:border-slate-700">
                            <div class="flex flex-wrap gap-2">
                                <button onclick="document.getElementById('abstract-${art.pmid}').classList.toggle('hidden')" class="text-sm font-medium text-slate-600 dark:text-slate-300 hover:text-blue-600 dark:hover:text-blue-400 bg-slate-100 dark:bg-slate-700 hover:bg-blue-50 dark:hover:bg-slate-600 px-3 py-1.5 rounded-lg transition-colors">
                                    <i class="fa-solid fa-align-left mr-1"></i> Resumen
                                </button>

                                <button id="tldr-btn-${art.pmid}" onclick="generateTldr('${art.pmid}')" class="text-sm font-medium text-white bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-700 hover:to-indigo-700 px-3 py-1.5 rounded-lg transition-colors shadow-sm" title="Resumen clínico con IA: qué cambia en tu práctica">
                                    <i class="fa-solid fa-wand-magic-sparkles mr-1"></i> TL;DR clínico
                                </button>
                                
                                <a href="https://pubmed.ncbi.nlm.nih.gov/${art.pmid}/" target="_blank" class="text-sm font-medium text-blue-600 dark:text-blue-400 border border-blue-600 dark:border-blue-400 hover:bg-blue-600 hover:text-white dark:hover:bg-blue-500 px-3 py-1.5 rounded-lg transition-colors">
                                    <i class="fa-solid fa-globe mr-1"></i> PubMed
                                </a>

                                <button id="copy-btn-${art.pmid}" onclick="copyCitation('${art.pmid}', '${art.title.replace(/'/g, "\\'")}', '${art.journal}', '${art.year}')" class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white px-3 py-1.5 rounded-lg transition-colors">
                                    <i class="fa-regular fa-copy mr-1"></i> Copiar
                                </button>

                                <button onclick="downloadRIS('${art.pmid}', '${art.title.replace(/'/g, "\\'")}', '${art.journal}', '${art.year}', '${art.doi}')" class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white px-3 py-1.5 rounded-lg transition-colors" title="Descargar archivo RIS">
                                    <i class="fa-solid fa-file-export mr-1"></i> RIS
                                </button>
                            </div>

                            ${art.doi ? `<div class="flex flex-wrap gap-2 lg:ml-auto"><div id="unpaywall-${art.pmid}" class="flex items-center min-w-[110px] justify-center"><span class="text-sm font-medium text-slate-400 dark:text-slate-500 border border-slate-200 dark:border-slate-600 px-3 py-1.5 rounded-lg flex items-center"><i class="fa-solid fa-spinner fa-spin mr-1"></i> Buscando...</span></div></div>` : ''}
                        </div>
                    </div>
                `;
                container.appendChild(card);
                if (art.doi) checkUnpaywallAsync(art.doi, art.pmid);
            });
        }
    </script>
</body>
</html>
